  <!-- 静态内容：让搜索引擎和 AI 爬虫（不执行 JS）也能看到网站内容 -->
  <noscript>
    <div style="padding:20px;max-width:600px;margin:0 auto;font-family:sans-serif;">
      <h1>AI彩票分析系统</h1>
      <p>大乐透、双色球、排列3、排列5 历史开奖数据管理与自动采集工具。</p>
      <h2>功能模块</h2>
      <ul>
        <li><strong>大乐透</strong> - 前区5个号码(1-35) + 后区2个号码(1-12)，体彩周一三六开奖</li>
        <li><strong>双色球</strong> - 红球6个(1-33) + 蓝球1个(1-16)，福彩二四日开奖</li>
        <li><strong>排列3</strong> - 百位/十位/个位(0-9)，体彩每日开奖</li>
        <li><strong>排列5</strong> - 五位号码(0-9)，体彩每日开奖</li>
        <li><strong>数据采集</strong> - 自动获取最新开奖数据，支持一键采集与手动更新</li>
        <li><strong>历史数据库</strong> - 本地存储(IndexedDB)，支持Excel导入导出</li>
        <li><strong>AI分析</strong> - 号码冷热、遗漏、奇偶、大小、历史趋势分析（仅做数据分析，不预测中奖）</li>
      </ul>
      <p>本系统仅提供历史数据分析功能，不承诺中奖，请理性购彩。</p>
    </div>
  </noscript>
